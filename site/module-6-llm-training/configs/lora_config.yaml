# LoRA Fine-Tuning Configuration
# Model  : TinyLlama/TinyLlama-1.1B-Chat-v1.0
# Runtime: CPU-only (Windows / macOS / Linux — no GPU required)
# Time   : ~30-60 min on a modern laptop (3 epochs, 300 examples)

model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  cache_dir: "./models"

# LoRA adapters — small rank keeps memory low on CPU
lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

# Training — tuned for CPU: batch=1, accumulate=8, short sequences
training:
  output_dir: "./models/lithia-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8    # effective batch = 8
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.001
  max_grad_norm: 0.3
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  max_seq_length: 512               # shorter = faster on CPU
