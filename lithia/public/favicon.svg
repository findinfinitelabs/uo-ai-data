<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: UO Green rounded square -->
  <rect width="100" height="100" rx="18" fill="#007030"/>

  <!-- Neural network nodes (AI motif) — subtle yellow dots -->
  <circle cx="18" cy="22" r="4.5" fill="#FEE11A" opacity="0.55"/>
  <circle cx="50" cy="14" r="4.5" fill="#FEE11A" opacity="0.55"/>
  <circle cx="82" cy="22" r="4.5" fill="#FEE11A" opacity="0.55"/>

  <!-- Connecting lines between nodes -->
  <line x1="18" y1="22" x2="50" y2="14" stroke="#FEE11A" stroke-width="1.8" opacity="0.35"/>
  <line x1="50" y1="14" x2="82" y2="22" stroke="#FEE11A" stroke-width="1.8" opacity="0.35"/>
  <line x1="18" y1="22" x2="82" y2="22" stroke="#FEE11A" stroke-width="1.8" opacity="0.2"/>

  <!-- UO text — prominent and centered -->
  <text
    x="50" y="71"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="46"
    font-weight="900"
    fill="#FEE11A"
    letter-spacing="-1"
  >UO</text>

  <!-- Thin yellow underline accent -->
  <rect x="22" y="78" width="56" height="3.5" rx="1.75" fill="#FEE11A" opacity="0.75"/>
</svg>
